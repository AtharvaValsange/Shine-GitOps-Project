apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atharva-shine
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AtharvaValsange/Shine-GitOps-Project.git
    targetRevision: main
    path: Retail-chart
    helm:
      values: |
        userprofile:
          activeVersion: blue
  destination:
    server: https://kubernetes.default.svc
    namespace: retail
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
